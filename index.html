<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodScape</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background music -->
<audio id="bgm" loop></audio>

<div class="container">

  <h1>🌈 MoodScape</h1>
  <p>Select your current mood to visualize your day:</p>

  <div class="mood-buttons">
    <button onclick="setMood('Happy')">😊 Happy</button>
    <button onclick="setMood('Sad')">😢 Sad</button>
    <button onclick="setMood('Excited')">🤩 Excited</button>
    <button onclick="setMood('Relaxed')">😌 Relaxed</button>
    <button onclick="setMood('Angry')">😡 Angry</button>
  </div>

  <div class="result" id="result">
    <h2 id="quote"></h2>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
